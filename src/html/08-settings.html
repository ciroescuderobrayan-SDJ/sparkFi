<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuración - SparkFi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon con el rayo de SparkFi generado como SVG inline -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="stylesheet" href="/src/css/08-settings.css" />
  </head>

  <body>
    <!-- Header con borde inferior, igual al de perfil; la tuerquita tiene --active para verse rellena -->
    <header class="settings-header">
      <div class="settings-header__brand">
        <span class="settings-header__brand-icon">⚡</span>
        <span class="settings-header__brand-text">SparkFi</span>
      </div>

      <!-- "Perfil" queda activo en la nav porque configuración es una subsección del perfil -->
      <nav class="settings-header__nav">
        <a href="03-home.html" class="settings-header__nav-link">Inicio</a>
        <a href="04-courses.html" class="settings-header__nav-link">Cursos</a>
        <a href="05-challenges.html" class="settings-header__nav-link">Retos</a>
        <a href="06-community.html" class="settings-header__nav-link">Comunidad</a>
        <a href="07-profile.html" class="settings-header__nav-link settings-header__nav-link--active">Perfil</a>
      </nav>

      <!-- La tuerquita tiene --active para verse sólida y señalar que esta es la página actual -->
      <a href="08-settings.html" class="settings-header__settings-link settings-header__settings-link--active" title="Configuración">⚙️</a>

      <a href="07-profile.html" class="settings-header__avatar-link">
        <img src="https://i.pravatar.cc/60" alt="Usuario" class="settings-header__avatar-image" />
      </a>
    </header>

    <div class="settings-page">
      <!-- Panel central de configuración; separado en secciones por categoría -->
      <main class="settings-panel">
        <h2 class="settings-panel__title">Configuración</h2>

        <!-- Sección 1: edición de nombre y correo del perfil -->
        <section class="settings-section settings-section--profile">
          <h3 class="settings-section__title">Editar perfil</h3>

          <!-- Foto de perfil actual con botón para cambiarla -->
          <div class="settings-section__avatar-row">
            <img
              src="https://i.pravatar.cc/80"
              alt="Foto de perfil"
              class="settings-section__avatar-image"
            />
            <button type="button" class="settings-section__change-photo-button">Cambiar foto</button>
          </div>

          <label class="settings-form__label" for="edit-nombre">Nombre completo</label>
          <input
            id="edit-nombre"
            type="text"
            class="settings-form__input"
            placeholder="Juan Pérez"
            value="Juan Pérez"
            autocomplete="name"
          />

          <label class="settings-form__label" for="edit-email">Correo electrónico</label>
          <input
            id="edit-email"
            type="email"
            class="settings-form__input"
            placeholder="juan@example.com"
            value="juan.perez@example.com"
            autocomplete="email"
          />

          <button type="button" class="settings-form__submit settings-form__submit--profile">Guardar perfil</button>
        </section>

        <!-- Sección 2: cambio de contraseña con validación en el JS -->
        <section class="settings-section settings-section--password">
          <h3 class="settings-section__title">Cambiar contraseña</h3>
          <form id="form-password" class="settings-form settings-form--password">
            <label class="settings-form__label" for="password-actual">Contraseña actual</label>
            <input
              id="password-actual"
              type="password"
              class="settings-form__input"
              placeholder="••••••••"
              autocomplete="current-password"
            />

            <label class="settings-form__label" for="password-nueva">Nueva contraseña</label>
            <input
              id="password-nueva"
              type="password"
              class="settings-form__input"
              placeholder="••••••••"
              autocomplete="new-password"
            />

            <label class="settings-form__label" for="password-confirmar">Confirmar nueva contraseña</label>
            <input
              id="password-confirmar"
              type="password"
              class="settings-form__input"
              placeholder="••••••••"
              autocomplete="new-password"
            />

            <!-- El JS inyecta aquí el resultado de la validación; el CSS lo oculta cuando está vacío -->
            <div id="resultado-settings" class="settings-form__feedback"></div>

            <button
              id="btn-guardar-password"
              type="button"
              class="settings-form__submit"
            >
              Guardar cambios
            </button>
          </form>
        </section>

        <!-- Sección 3: toggles para activar o desactivar tipos de notificación -->
        <section class="settings-section settings-section--notifications">
          <h3 class="settings-section__title">Notificaciones</h3>

          <div class="settings-toggle">
            <span class="settings-toggle__label">Correo electrónico</span>
            <!-- Toggle switch hecho en CSS puro: el input oculto controla el estado -->
            <label class="settings-toggle__switch">
              <input type="checkbox" checked />
              <span class="settings-toggle__slider"></span>
            </label>
          </div>

          <div class="settings-toggle">
            <span class="settings-toggle__label">Push</span>
            <label class="settings-toggle__switch">
              <input type="checkbox" checked />
              <span class="settings-toggle__slider"></span>
            </label>
          </div>
        </section>

        <!-- Sección 4: opciones de privacidad del perfil -->
        <section class="settings-section settings-section--privacy">
          <h3 class="settings-section__title settings-section__title--muted">Privacidad y seguridad</h3>

          <div class="settings-toggle">
            <span class="settings-toggle__label">Perfil público</span>
            <label class="settings-toggle__switch">
              <input type="checkbox" />
              <span class="settings-toggle__slider"></span>
            </label>
          </div>

          <div class="settings-toggle">
            <span class="settings-toggle__label">Mostrar actividad reciente</span>
            <label class="settings-toggle__switch">
              <input type="checkbox" checked />
              <span class="settings-toggle__slider"></span>
            </label>
          </div>
        </section>

        <!-- Sección 5: cierre de sesión al final del panel -->
        <section class="settings-section settings-section--logout">
          <a href="01-login.html" class="settings-panel__logout-link">Cerrar sesión</a>
        </section>
      </main>
    </div>

    <script src="/src/js/08-settings.js"></script>
  </body>
</html>
