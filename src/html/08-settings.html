<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuración - SparkFi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/css/08-settings.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">SparkFi</span>
      </div>

      <nav class="nav">
        <a href="03-home.html" class="nav-link">Inicio</a>
        <a href="04-courses.html" class="nav-link">Cursos</a>
        <a href="05-challenges.html" class="nav-link">Retos</a>
        <a href="06-community.html" class="nav-link">Comunidad</a>
        <a href="07-profile.html" class="nav-link">Perfil</a>
      </nav>

      <a href="07-profile.html" class="profile-mini">
        <img src="https://i.pravatar.cc/60" alt="Usuario" />
      </a>
    </header>

    <div class="settings-container">
      <main class="settings-content">
        <h2>Configuración</h2>

        <section class="password-section">
          <h3>Cambiar contraseña</h3>
          <form id="form-password">
            <input id="password-actual" type="password" placeholder="Contraseña actual" />
            <input id="password-nueva" type="password" placeholder="Nueva contraseña" />
            <input id="password-confirmar" type="password" placeholder="Confirmar nueva contraseña" />
          </form>

          <div id="resultado-settings"></div>

          <button id="btn-guardar-password" class="btn-guardar">Guardar cambios</button>
        </section>

        <section class="notifications-section">
          <h3>Notificaciones</h3>
          <div class="notification-item">
            <span>Correo electrónico</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
          <div class="notification-item">
            <span>Push</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
        </section>

        <section class="privacy-section">
          <h3>Privacidad y seguridad</h3>
          <div class="notification-item">
            <span>Perfil público</span>
            <label class="switch">
              <input type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="notification-item">
            <span>Mostrar actividad reciente</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
        </section>

        <section class="logout-section">
          <h3>Cerrar sesión</h3>
          <a href="01-login.html" class="btn-logout">Cerrar sesión</a>
        </section>
      </main>
    </div>

    <script src="/src/js/08-settings.js"></script>
  </body>
</html>
