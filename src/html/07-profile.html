<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - SparkFi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/css/07-profile.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">SparkFi</span>
      </div>

      <nav class="nav">
        <a href="03-home.html" class="nav-link">Inicio</a>
        <a href="04-courses.html" class="nav-link">Cursos</a>
        <a href="05-challenges.html" class="nav-link">Retos</a>
        <a href="06-community.html" class="nav-link">Comunidad</a>
        <a href="07-profile.html" class="nav-link active">Perfil</a>
      </nav>

      <a href="08-settings.html" class="profile-mini">
        <img src="https://i.pravatar.cc/50" alt="perfil" />
      </a>
    </header>

    <main class="profile-layout">
      <aside class="profile-card">
        <div class="avatar-circle">
          <img
            src="https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg"
            alt="Foto de perfil"
          />
        </div>

        <h1 class="profile-name">Juan Pérez</h1>
        <p class="profile-email">juan.perez@example.com</p>

        <span class="level-pill">Nivel 3</span>

        <section class="summary">
          <div class="summary-item">
            <span class="summary-number">4</span>
            <span class="summary-label">Cursos<br />completados</span>
          </div>

          <div class="summary-item">
            <span class="summary-number summary-number-icon">⦿</span>
            <span class="summary-label">Retos<br />ganados</span>
          </div>

          <div class="summary-item">
            <span class="summary-number">$900,000</span>
            <span class="summary-label">Ahorro<br />acumulado</span>
          </div>
        </section>

        <a href="01-login.html" class="logout-btn">Cerrar sesión</a>
      </aside>

      <section class="achievements-section">
        <h2 class="section-title">Mis logros</h2>

        <div class="achievements-grid">
          <article class="achievement-card">
            <div class="achievement-icon blue">★</div>
            <p class="achievement-text">Sobre la marcha</p>
          </article>

          <article class="achievement-card">
            <div class="achievement-icon green">✓</div>
            <p class="achievement-text">Gran ahorrador</p>
          </article>

          <article class="achievement-card">
            <div class="achievement-icon yellow">🏆</div>
            <p class="achievement-text">Primer lugar</p>
          </article>
        </div>
      </section>
    </main>

    <script src="/src/js/07-profile.js"></script>
  </body>
</html>
