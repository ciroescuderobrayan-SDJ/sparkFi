<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - SparkFi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="stylesheet" href="/src/css/07-profile.css" />
  </head>

  <body>
    <header class="profile-header">
      <div class="profile-header__brand">
        <div class="profile-header__brand-icon">⚡</div>
        <span class="profile-header__brand-text">SparkFi</span>
      </div>

      <nav class="profile-header__nav">
        <a href="03-home.html" class="profile-header__nav-link">Inicio</a>
        <a href="04-courses.html" class="profile-header__nav-link">Cursos</a>
        <a href="05-challenges.html" class="profile-header__nav-link">Retos</a>
        <a href="06-community.html" class="profile-header__nav-link">Comunidad</a>
        <a href="07-profile.html" class="profile-header__nav-link profile-header__nav-link--active">Perfil</a>
      </nav>

      <a href="08-settings.html" class="profile-header__settings-link" title="Configuración">⚙️</a>

      <a href="07-profile.html" class="profile-header__avatar-link">
        <img src="https://i.pravatar.cc/50" alt="perfil" class="profile-header__avatar-image" />
      </a>
    </header>

    <main class="profile-page">
      <aside class="profile-sidebar">
        <div class="profile-sidebar__avatar">
          <img
            src="https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg"
            alt="Foto de perfil"
            class="profile-sidebar__avatar-image"
          />
        </div>

        <h1 class="profile-sidebar__name">Juan Pérez</h1>
        <p class="profile-sidebar__email">juan.perez@example.com</p>
        <span class="profile-sidebar__level-badge">Nivel 3</span>

        <div class="profile-sidebar__actions">
          <a href="08-settings.html" class="profile-sidebar__edit-link">Editar perfil</a>
          <a href="08-settings.html" class="profile-sidebar__settings-shortcut" title="Configuración">⚙️</a>
        </div>

        <section class="profile-sidebar__stats">
          <div class="profile-sidebar__stat-item">
            <span class="profile-sidebar__stat-value">4</span>
            <span class="profile-sidebar__stat-label">Cursos<br />completados</span>
          </div>

          <div class="profile-sidebar__stat-item">
            <span class="profile-sidebar__stat-value">5</span>
            <span class="profile-sidebar__stat-label">Retos<br />ganados</span>
          </div>

          <div class="profile-sidebar__stat-item">
            <span class="profile-sidebar__stat-value">$900,000</span>
            <span class="profile-sidebar__stat-label">Ahorro<br />acumulado</span>
          </div>
        </section>

        <a href="01-login.html" class="profile-sidebar__logout-link">Cerrar sesión</a>
      </aside>

      <section class="profile-achievements">
        <h2 class="profile-achievements__title">Mis logros</h2>

        <div class="profile-achievements__grid">
          <article class="profile-achievements__card">
            <div class="profile-achievements__icon profile-achievements__icon--blue">★</div>
            <p class="profile-achievements__text">Sobre la marcha</p>
          </article>

          <article class="profile-achievements__card">
            <div class="profile-achievements__icon profile-achievements__icon--green">✓</div>
            <p class="profile-achievements__text">Gran ahorrador</p>
          </article>

          <article class="profile-achievements__card">
            <div class="profile-achievements__icon profile-achievements__icon--yellow">🏆</div>
            <p class="profile-achievements__text">Primer lugar</p>
          </article>
        </div>

        <a href="#" class="profile-achievements__link">Ver todos los logros →</a>
      </section>
    </main>

    <script src="/src/js/07-profile.js"></script>
  </body>
</html>
