<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio - SparkFi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/css/03-home.css" />
  </head>

  <body>
    <div class="page">
      <header class="topbar">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">SparkFi</span>
        </div>

        <nav class="nav">
          <a href="03-home.html" class="nav-link active">Inicio</a>
          <a href="04-courses.html" class="nav-link">Cursos</a>
          <a href="05-challenges.html" class="nav-link">Retos</a>
          <a href="06-community.html" class="nav-link">Comunidad</a>
          <a href="07-profile.html" class="nav-link">Perfil</a>
        </nav>

        <a href="07-profile.html" class="avatar-mini">
          <span class="avatar-circle">👤</span>
        </a>
      </header>

      <main class="dashboard">
        <section class="hero">
          <h1 class="hero-title">
            Bienvenido, Juan <span class="wave">👋</span>
          </h1>

          <div class="chart-card">
            <svg
              class="chart-svg"
              viewBox="0 0 600 260"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect x="0" y="0" width="600" height="260" rx="26" fill="#eef3ff" />

              <line x1="70" y1="70" x2="550" y2="70" stroke="#d4ddff" stroke-width="1" />
              <line x1="70" y1="120" x2="550" y2="120" stroke="#d4ddff" stroke-width="1" />
              <line x1="70" y1="170" x2="550" y2="170" stroke="#d4ddff" stroke-width="1" />

              <text x="30" y="175" font-size="10" fill="#5a626e" font-family="Inter, system-ui">COP 200</text>
              <text x="30" y="125" font-size="10" fill="#5a626e" font-family="Inter, system-ui">COP 250</text>
              <text x="30" y="75" font-size="10" fill="#5a626e" font-family="Inter, system-ui">COP 500</text>

              <path
                d="M 80 180 L 180 140 L 260 160 L 340 150 L 460 110 L 540 70 L 540 200 L 80 200 Z"
                fill="rgba(0,106,248,0.10)"
              />

              <path
                d="M 80 180 L 180 140 L 260 160 L 340 150 L 460 110 L 540 70"
                fill="none"
                stroke="#0a3dfe"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />

              <path d="M 540 70 L 530 76" stroke="#0a3dfe" stroke-width="4" stroke-linecap="round" />
              <path d="M 540 70 L 534 60" stroke="#0a3dfe" stroke-width="4" stroke-linecap="round" />

              <circle cx="180" cy="140" r="6" fill="#0a3dfe" />
              <circle cx="260" cy="160" r="6" fill="#0a3dfe" />
              <circle cx="460" cy="110" r="6" fill="#0a3dfe" />
            </svg>
          </div>
        </section>

        <section class="quick-actions">
          <a href="04-courses.html" class="qa-card-link">
            <article class="qa-card">
              <div class="qa-icon">📘</div>
              <h2 class="qa-title">Mis cursos activos</h2>
              <p class="qa-subtitle">Haciendo</p>
            </article>
          </a>

          <a href="05-challenges.html" class="qa-card-link">
            <article class="qa-card">
              <div class="qa-icon">🎯</div>
              <h2 class="qa-title">Retos financieros</h2>
              <p class="qa-subtitle">En progreso</p>
            </article>
          </a>

          <a href="07-profile.html" class="qa-card-link">
            <article class="qa-card">
              <div class="qa-icon">💰</div>
              <h2 class="qa-title">Mi ahorro mensual</h2>
              <p class="qa-subtitle">COP 350,000</p>
            </article>
          </a>
        </section>
      </main>
    </div>

    <script src="/src/js/03-home.js"></script>
  </body>
</html>
