<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión - SparkFi</title>

    <!-- Fuente Inter desde Google Fonts; preconnect adelanta la conexión para que cargue más rápido -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon con el rayo ⚡ del logo; SVG inline evita tener que crear un archivo .ico -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />

    <link rel="stylesheet" href="/src/css/01-login.css" />
  </head>
  <body>

    <!-- Flexbox en el CSS centra esta tarjeta tanto vertical como horizontalmente -->
    <div class="auth-page">

      <!-- Tarjeta blanca con formulario y candado decorativo; position: relative para el candado -->
      <div class="auth-card">

        <header class="auth-header">
          <div class="brand">
            <span class="brand-icon">⚡</span>
            <span class="brand-text">SparkFi</span>
          </div>
        </header>

        <main class="auth-content">
          <h1 class="auth-title">Iniciar sesión</h1>

          <!-- type="button" para que el JS maneje el envío manualmente y pueda validar antes -->
          <form class="auth-form">

            <!-- for="email" conecta el label con el input para accesibilidad y clic directo -->
            <label class="field-label" for="email">Correo electrónico</label>
            <!-- autocomplete="email" sugiere correos guardados en el navegador -->
            <input
              id="email"
              type="email"
              placeholder="admin@sparkfi.com"
              class="field-input"
              autocomplete="email"
            />

            <label class="field-label" for="password">Contraseña</label>
            <!-- current-password indica que es para iniciar sesión, no para crear una nueva -->
            <input
              id="password"
              type="password"
              placeholder="•••••••"
              class="field-input"
              autocomplete="current-password"
            />

            <!-- El JS inyecta aquí los mensajes de error o éxito; el CSS lo oculta cuando está vacío -->
            <div id="resultado-login"></div>

            <button id="btn-login" type="button" class="btn-primary">Iniciar sesión</button>
          </form>

          <!-- Pendiente de implementar; está deshabilitado para no confundir al usuario -->
          <span class="link-forgot link-forgot--disabled" title="Próximamente disponible">¿Olvidaste tu contraseña?</span>

          <div class="divider"></div>

          <p class="signup-text">
            ¿No tienes cuenta?
            <a href="02-create-account.html" class="link-signup">Crear cuenta</a>
          </p>
        </main>

        <!-- Candado decorativo hecho con divs y CSS puro, sin imágenes; posicionado en la esquina inferior derecha -->
        <div class="security-badge">
          <div class="security-lock-top"></div>
          <div class="security-lock-body">
            <span class="security-icon">🔒</span>
          </div>
        </div>

      </div>
    </div>

    <!-- JS al final del body para que el HTML ya exista cuando el script se ejecute -->
    <script src="/src/js/01-login.js"></script>
  </body>
</html>
