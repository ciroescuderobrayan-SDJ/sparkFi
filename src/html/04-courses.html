<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursos - SparkFi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/css/04-courses.css" />
  </head>

  <body>
    <div class="pagina-cursos">
      <!-- El nav -->
      <header class="encabezado-principal">
        <div class="marca">
          <span class="marca-simbolo">⚡</span>
          <span class="marca-nombre">SparkFi</span>
        </div>

        <nav class="navegacion-principal">
          <a href="./03-home.html" class="enlace-navegacion">Inicio</a>
          <a href="./04-courses.html" class="enlace-navegacion activo"
            >Cursos</a
          >
          <a href="./05-challenges.html" class="enlace-navegacion">Retos</a>
          <a href="./06-community.html" class="enlace-navegacion">Comunidad</a>
          <a href="./07-profile.html" class="enlace-navegacion">Perfil</a>
        </nav>

        <div class="avatar-usuario">
          <span class="avatar-usuario-circulo">👤</span>
        </div>
      </header>

      <!-- contenido central -->
      <main class="contenedor-cursos">
        <!-- lista de cursos -->
        <aside class="barra-lateral-cursos">
          <h2 class="titulo-barra-cursos">Cursos</h2>


          <input
            type="text"
            class="campo-busqueda-cursos"
            placeholder="Buscar curso..."
            aria-label="Buscar curso"
          />

          <p id="mensaje-vacio-cursos" class="texto-progreso-curso" hidden>No se encontraron cursos.</p>

          <button class="boton-tema-curso activo">Introducción al ahorro</button>
          <button class="boton-tema-curso">Introducción a la inversión</button>
          <button class="boton-tema-curso">Introducción al presupuesto</button>
          <button class="boton-tema-curso">Presupuesto básico</button>
          <button class="boton-tema-curso">Fundamentos de inversión</button>
          <button class="boton-tema-curso">Fondo de emergencia</button>
          <button class="boton-tema-curso">Control de gastos hormiga</button>
          <button class="boton-tema-curso">Ahorro por objetivos</button>
          <button class="boton-tema-curso">Método 50/30/20</button>
          <button class="boton-tema-curso">Presupuesto familiar</button>
          <button class="boton-tema-curso">Inversión en fondos indexados</button>
          <button class="boton-tema-curso">Perfil de riesgo e inversión</button>
        </aside>

        <!-- contenido de la derecha -->
        <section class="contenido-cursos">

          
          <header class="encabezado-cursos">
            <h1 class="titulo-cursos">Vista de lección</h1>
          </header>

          <!-- las lecciones -->
          <section class="lista-cursos"></section>
          
          
          <section class="seccion-leccion">
            <h2 class="titulo-leccion">Vista de lección</h2>

            
            <div class="barra-progreso-leccion">
              <div class="relleno-progreso-leccion"></div>
            </div>

            <div class="tarjeta-leccion">
              <div class="texto-leccion">
                <p class="porcentaje-leccion">65% completado</p>
                <ul class="lista-leccion">
                  <li>Reducir gastos en entretenimiento</li>
                </ul>
              </div>

              <div class="video-leccion">
                <span class="icono-reproducir">▶</span>
              </div>
            </div>

            <button class="boton-completar-leccion">
              Marcar como completado
            </button>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="../js/04-courses.js"></script>
  </body>
</html>
