<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta - SparkFi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"
    />
    <link rel="stylesheet" href="/src/css/02-create-account.css" />
  </head>

  <body>
    <div class="register-page">
      <div class="register-card">
        <header class="register-card__header">
          <div class="register-card__brand">
            <span class="register-card__brand-icon">⚡</span>
            <span class="register-card__brand-text">SparkFi</span>
          </div>

          <a href="01-login.html" class="register-card__login-link">Iniciar sesión</a>
        </header>

        <main class="register-card__content">
          <h1 class="register-card__title">Crear una cuenta</h1>

          <form class="register-form">
            <label class="register-form__label" for="nombre">Nombre completo</label>
            <input
              id="nombre"
              type="text"
              class="register-form__input"
              placeholder="Juan Pérez"
              required
              autocomplete="name"
            />

            <label class="register-form__label" for="email-registro">Correo</label>
            <input
              id="email-registro"
              type="email"
              class="register-form__input"
              placeholder="juan@example.com"
              required
              autocomplete="email"
            />

            <label class="register-form__label" for="password-registro">Contraseña</label>
            <input
              id="password-registro"
              type="password"
              class="register-form__input"
              placeholder="•••••••"
              required
              autocomplete="new-password"
            />

            <label class="register-form__label" for="confirmar-password">
              Confirmar contraseña
            </label>
            <input
              id="confirmar-password"
              type="password"
              class="register-form__input"
              placeholder="•••••••"
              required
              autocomplete="new-password"
            />
            <small class="register-form__hint">
              Debe coincidir con la contraseña anterior
            </small>

            <label class="register-form__terms">
              <input id="terminos" type="checkbox" class="register-form__checkbox" />
              <span>
                Acepto los
                <a href="#" class="register-form__terms-link">términos y condiciones</a>
              </span>
            </label>

            <div
              id="resultado-registro"
              class="register-form__feedback"
              aria-live="polite"
            ></div>

            <button id="btn-registro" type="button" class="register-form__submit">
              Registrarme
            </button>
          </form>
        </main>
      </div>
    </div>

    <script src="/src/js/02-create-account.js"></script>
  </body>
</html>
