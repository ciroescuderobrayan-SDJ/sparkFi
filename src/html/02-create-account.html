<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta - SparkFi</title>

    <!-- Precarga de Google Fonts para mejorar la velocidad de carga -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Ícono de la pestaña: el rayo es el símbolo de SparkFi -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9889;</text></svg>"
    />

    <link rel="stylesheet" href="/src/css/02-create-account.css" />
  </head>

  <body>
    <!-- Contenedor principal que centra la tarjeta en la página -->
    <div class="pagina-crear-cuenta">

      <!-- Tarjeta blanca donde vive todo el formulario de registro -->
      <div class="tarjeta-crear-cuenta">

        <!-- Encabezado: logo de SparkFi a la izquierda, botón de login a la derecha -->
        <header class="encabezado-tarjeta-crear-cuenta">
          <div class="marca-tarjeta-crear-cuenta">
            <span class="icono-marca-crear-cuenta">&#9889;</span>
            <span class="texto-marca-crear-cuenta">SparkFi</span>
          </div>

          <!-- Si el usuario ya tiene cuenta, lo llevamos directo al login -->
          <a href="01-login.html" class="enlace-iniciar-sesion"
            >Iniciar sesi&oacute;n</a
          >
        </header>

        <main class="contenido-tarjeta-crear-cuenta">
          <h1 class="titulo-crear-cuenta">Crear una cuenta</h1>

          <!-- Formulario de registro con todos los campos necesarios para darse de alta -->
          <form class="formulario-crear-cuenta">

            <!-- Campo del nombre real del usuario -->
            <label
              class="etiqueta-formulario-crear-cuenta"
              for="nombre-completo"
              >Nombre completo</label
            >
            <input
              id="nombre-completo"
              type="text"
              class="campo-formulario-crear-cuenta campo-nombre-completo"
              placeholder="Juan P&eacute;rez"
              required
              autocomplete="name"
            />

            <!-- Correo que servirá como identificador de la cuenta -->
            <label class="etiqueta-formulario-crear-cuenta" for="correo"
              >Correo</label
            >
            <input
              id="correo"
              type="email"
              class="campo-formulario-crear-cuenta campo-correo"
              placeholder="juan@example.com"
              required
              autocomplete="email"
            />

            <!-- Contraseña nueva que el usuario quiere usar en la plataforma -->
            <label class="etiqueta-formulario-crear-cuenta" for="contrasena"
              >Contrase&ntilde;a</label
            >
            <input
              id="contrasena"
              type="password"
              class="campo-formulario-crear-cuenta campo-contrasena"
              placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
              required
              autocomplete="new-password"
            />

            <!-- Confirmación para asegurarse de que el usuario no cometió un error al escribir -->
            <label
              class="etiqueta-formulario-crear-cuenta"
              for="confirmar-contrasena"
            >
              Confirmar contrase&ntilde;a
            </label>
            <input
              id="confirmar-contrasena"
              type="password"
              class="campo-formulario-crear-cuenta campo-confirmar-contrasena"
              placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
              required
              autocomplete="new-password"
            />
            <!-- Pista visual debajo del campo para recordarle al usuario que debe coincidir -->
            <small class="pista-formulario-crear-cuenta">
              Debe coincidir con la contrase&ntilde;a anterior
            </small>

            <!-- Checkbox de aceptación: el registro no avanza sin esto -->
            <label class="terminos-formulario-crear-cuenta">
              <input id="terminos" type="checkbox" class="casilla-terminos" />
              <span>
                Acepto los
                <a href="#" class="enlace-terminos"
                  >t&eacute;rminos y condiciones</a
                >
              </span>
            </label>

            <!-- Zona donde el JS inyecta errores o el mensaje de éxito tras intentar registrarse -->
            <div
              id="resultado-crear-cuenta"
              class="resultado-formulario-crear-cuenta"
              aria-live="polite"
            ></div>

            <!-- Botón principal que dispara la validación y el registro -->
            <button
              id="boton-crear-cuenta"
              type="button"
              class="boton-crear-cuenta"
            >
              Registrarme
            </button>
          </form>
        </main>
      </div>
    </div>

    <script src="/src/js/02-create-account.js"></script>
  </body>
</html>
